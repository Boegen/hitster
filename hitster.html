<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Musik-Quiz</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .player-container {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            text-align: center;
        }
        iframe {
            display: none;
        }
        button {
            margin-top: 15px;
            padding: 10px 20px;
            font-size: 16px;
            border: none;
            background-color: #28a745;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background-color: #218838;
        }
        .volume-container {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 15px;
        }
        input[type="range"] {
            width: 150px;
            cursor: pointer;
            accent-color: #007bff;
        }
        .volume-icon {
            font-size: 20px;
        }
    </style>
</head>
<body>
    <div class="player-container">
        <h2>🎵 Errate den Song!</h2>
        <div id="player"></div>
        <button id="playPauseButton">Starte den Song</button>
        <br>
        <div class="volume-container">
            <span class="volume-icon">🔊</span>
            <input type="range" id="volumeControl" min="0" max="100" value="50">
        </div>
    </div>

    <script>
        let player;
        const params = new URLSearchParams(window.location.search);
        const songId = params.get('song');
        const playPauseButton = document.getElementById('playPauseButton');
        const volumeControl = document.getElementById('volumeControl');

        function onYouTubeIframeAPIReady() {
            if (songId) {
                player = new YT.Player('player', {
                    height: '0',
                    width: '0',
                    videoId: songId,
                    playerVars: {
                        'autoplay': 0,
                        'controls': 0,
                        'showinfo': 0,
                        'modestbranding': 1,
                        'rel': 0
                    },
                    events: {
                        'onReady': onPlayerReady
                    }
                });
            } else {
                document.getElementById('player').innerHTML = '<h2>Kein Song ausgewählt!</h2>';
            }
        }

        function onPlayerReady(event) {
            playPauseButton.addEventListener("click", function () {
                if (player.getPlayerState() === 1) {
                    player.pauseVideo();
                    playPauseButton.textContent = "Starte den Song";
                } else {
                    player.playVideo();
                    playPauseButton.textContent = "Pausiere den Song";
                }
            });

            volumeControl.addEventListener("input", function () {
                player.setVolume(volumeControl.value);
            });
        }

        let tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        let firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);
    </script>
</body>
</html>
