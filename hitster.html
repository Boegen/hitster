<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Musik-Quiz</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .player-container {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            text-align: center;
        }
        iframe {
            display: none; /* Versteckt das Video */
        }
        button {
            margin-top: 15px;
            padding: 10px 20px;
            font-size: 16px;
            border: none;
            background-color: #28a745;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background-color: #218838;
        }
    </style>
</head>
<body>
    <div class="player-container">
        <h2>🎵 Errate den Song!</h2>
        <div id="player"></div>
        <button id="playButton">Starte den Song</button>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const songId = params.get('song'); // YouTube Video-ID
        const playerDiv = document.getElementById('player');
        const playButton = document.getElementById('playButton');

        if (songId) {
            playerDiv.innerHTML = `<iframe id="ytplayer" src="https://www.youtube.com/embed/${songId}?enablejsapi=1&autoplay=0&controls=0&showinfo=0&modestbranding=1&rel=0" allow="autoplay"></iframe>`;
        } else {
            playerDiv.innerHTML = '<h2>Kein Song ausgewählt!</h2>';
        }

        playButton.addEventListener("click", function () {
            if (songId) {
                const iframe = document.getElementById('ytplayer');
                iframe.contentWindow.postMessage('{"event":"command","func":"playVideo","args":""}', '*');
            }
        });
    </script>
</body>
</html>
